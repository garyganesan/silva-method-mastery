name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - staging

jobs:
  # Job 1: Deploy static website to Cloudflare Pages
  deploy-site:
    runs-on: ubuntu-latest
    name: Deploy Website
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set Cloudflare project name
        id: project
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=silvamethodmastery" >> $GITHUB_OUTPUT
          else
            echo "name=silvamethodmastery-staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cb982ebf22ca559a53eade697c49462f
          projectName: ${{ steps.project.outputs.name }}
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Deploy CMS Worker (staging branch only)
  deploy-cms-staging:
    runs-on: ubuntu-latest
    name: Deploy CMS (Staging)
    if: github.ref_name == 'staging'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Create D1 database (if not exists) and get ID
        id: d1
        run: |
          EXISTING=$(npx wrangler d1 list --json 2>/dev/null | python3 -c "import sys,json; dbs=json.load(sys.stdin); matches=[d for d in dbs if d.get('name')=='smm-cms-staging-db']; print(matches[0]['uuid'] if matches else '')" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Using existing D1 database: $EXISTING"
            echo "db_id=$EXISTING" >> $GITHUB_OUTPUT
          else
            echo "Creating new D1 database..."
            OUTPUT=$(npx wrangler d1 create smm-cms-staging-db 2>&1)
            echo "$OUTPUT"
            DB_ID=$(echo "$OUTPUT" | grep -oP '(?<=database_id = ")[a-f0-9-]+(?=")' | head -1)
            echo "Created database: $DB_ID"
            echo "db_id=$DB_ID" >> $GITHUB_OUTPUT
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cb982ebf22ca559a53eade697c49462f

      - name: Inject D1 database ID into wrangler config
        run: |
          sed -i "s/DB_ID_PLACEHOLDER/${{ steps.d1.outputs.db_id }}/" cms/wrangler.staging.toml

      - name: Apply D1 schema migrations
        run: |
          npx wrangler d1 execute smm-cms-staging-db --file=cms/schema.sql --remote --config=cms/wrangler.staging.toml || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cb982ebf22ca559a53eade697c49462f

      - name: Deploy CMS Worker to staging
        run: npx wrangler deploy --config=cms/wrangler.staging.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cb982ebf22ca559a53eade697c49462f
