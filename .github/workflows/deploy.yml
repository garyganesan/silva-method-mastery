name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - staging

jobs:
  # ── Job 1: Deploy static website to Cloudflare Pages
  deploy-site:
    runs-on: ubuntu-latest
    name: Deploy Website
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set Cloudflare project name
        id: project
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=silvamethodmastery" >> $GITHUB_OUTPUT
          else
            echo "name=silvamethodmastery-staging" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cb982ebf22ca559a53eade697c49462f
          projectName: ${{ steps.project.outputs.name }}
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Deploy CMS Worker (staging branch only)
  deploy-cms-staging:
    runs-on: ubuntu-latest
    name: Deploy CMS (Staging)
    if: github.ref_name == 'staging'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Apply D1 schema migrations
        run: |
          npx wrangler d1 execute smm-cms-staging-db \
            --file=cms/schema.sql \
            --remote \
            --config=cms/wrangler.staging.toml || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cb982ebf22ca559a53eade697c49462f

      - name: Deploy CMS Worker to staging
        run: |
          npx wrangler deploy \
            --config=cms/wrangler.staging.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: cb982ebf22ca559a53eade697c49462f
