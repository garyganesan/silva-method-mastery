# Silva Method Mastery CMS - Staging Worker Config
name = "smm-cms-staging"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT  = "staging"
ADMIN_EMAIL  = "ganesan.kanavathy@gmail.com"
SITE_BRANCH  = "staging"
GITHUB_OWNER = "garyganesan"
GITHUB_REPO  = "silva-method-mastery"
SITE_FILE    = "silva-method-mastery.html"

[[d1_databases]]
binding       = "DB"
database_name = "smm-cms-staging-db"
database_id   = "DB_ID_PLACEHOLDER"
